name: Build Book

on:
  push:
    branches: [main]
    paths:
      - "book/**"
      - "docs/**"
      - "mkdocs.yml"
      - "scripts/build_notebooks.py"
      - "scripts/check_day_structure.py"
      - "scripts/validate_notebooks.py"
      - ".github/workflows/book.yml"
  pull_request:
    paths:
      - "book/**"
      - "docs/**"
      - "mkdocs.yml"
      - "scripts/build_notebooks.py"
      - "scripts/check_day_structure.py"
      - "scripts/validate_notebooks.py"
      - ".github/workflows/book.yml"
  workflow_dispatch:

jobs:
  build-book:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,docs]"

      - name: Check day structure
        run: python scripts/check_day_structure.py

      - name: Generate notebooks
        run: python scripts/build_notebooks.py

      - name: Validate generated notebooks
        run: python scripts/validate_notebooks.py

      - name: Build MkDocs site
        run: mkdocs build --strict

      - name: Upload generated notebooks
        uses: actions/upload-artifact@v4
        with:
          name: generated-notebooks
          path: notebooks/

      - name: Upload site
        uses: actions/upload-artifact@v4
        with:
          name: mkdocs-site
          path: site/
