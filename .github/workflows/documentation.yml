name: Documentation Structure

on:
  push:
    branches: [main]
    paths:
      - "book/**"
      - "specifications/**"
      - "templates/**"
      - "standards/**"
      - "scripts/check_day_structure.py"
      - ".github/workflows/documentation.yml"
  pull_request:
    paths:
      - "book/**"
      - "specifications/**"
      - "templates/**"
      - "standards/**"
      - "scripts/check_day_structure.py"
      - ".github/workflows/documentation.yml"
  workflow_dispatch:

jobs:
  documentation-structure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check day structure
        run: python scripts/check_day_structure.py
