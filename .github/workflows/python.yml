name: Python

on:
  push:
    branches: [main]
    paths:
      - "mini_framework/**"
      - "ai_platform/**"
      - "examples/**"
      - "scripts/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/python.yml"
  pull_request:
    paths:
      - "mini_framework/**"
      - "ai_platform/**"
      - "examples/**"
      - "scripts/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/python.yml"
  workflow_dispatch:

jobs:
  python-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,docs]"

      - name: Lint Python source folders only
        run: |
          ruff check mini_framework ai_platform examples scripts tests

      - name: Run tests
        run: pytest
