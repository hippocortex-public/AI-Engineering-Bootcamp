name: Notebooks

on:
  push:
    branches: [main]
    paths:
      - "book/**/labs/**"
      - "notebooks/**"
      - "scripts/validate_notebooks.py"
      - ".github/workflows/notebooks.yml"
  pull_request:
    paths:
      - "book/**/labs/**"
      - "notebooks/**"
      - "scripts/validate_notebooks.py"
      - ".github/workflows/notebooks.yml"
  workflow_dispatch:

jobs:
  validate-notebooks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install notebook tooling
        run: |
          python -m pip install --upgrade pip
          pip install nbformat

      - name: Validate notebooks JSON
        run: python scripts/validate_notebooks.py
